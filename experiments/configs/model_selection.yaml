experiment_name: model_selection
dataset_path: experiments/datasets/synthetic_v1
output_path: experiments/results/model_selection

per_destination_forecasting:
  model_names:
    - naive_forecaster
    - seasonal_forecaster
    - rolling_window_forecaster
    - ets_forecaster
    - sarimax_forecaster
  train_ratio: 0.8
  selection_metric: wape
  minimum_history_length: 10
  random_seed: 42
  model_params:
    seasonal_forecaster:
      lag_value: 7
    rolling_window_forecaster:
      rolling_window: 7
